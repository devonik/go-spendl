name: Claude Assistant
on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]

permissions:
    contents: write
    pull-requests: write
    issues: write
    id-token: write

jobs:
    claude:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 1

            - uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  claude_args: |
                      --max-turns 20
                      --model claude-sonnet-4-5
